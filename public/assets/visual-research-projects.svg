<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Projects visual</title>
  <desc id="desc">A minimal project roadmap for hydrology research with task cards, milestones, and a basin outline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#edf6f3"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#1f7d78"/>
      <stop offset="1" stop-color="#76bcb4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2e6f73" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#dfeae7" stroke-width="1">
    <path d="M80 96h740M80 225h740M80 354h740"/>
    <path d="M180 58v334M350 58v334M520 58v334M690 58v334"/>
  </g>
  <path d="M175 113 326 72l138 54 154-32 109 98-36 128-171 72-145-48-135 54-96-112Z" fill="#ffffff" stroke="#dbe8e4" stroke-width="2"/>
  <g filter="url(#soft)">
    <rect x="156" y="118" width="172" height="112" rx="10" fill="#ffffff" stroke="#d9e7e3"/>
    <rect x="364" y="84" width="172" height="112" rx="10" fill="#ffffff" stroke="#d9e7e3"/>
    <rect x="572" y="142" width="172" height="112" rx="10" fill="#ffffff" stroke="#d9e7e3"/>
  </g>
  <g fill="#233532" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-weight="700">
    <text x="184" y="154" font-size="24">Scope</text>
    <text x="392" y="120" font-size="24">Fieldwork</text>
    <text x="600" y="178" font-size="24">Delivery</text>
  </g>
  <g fill="#667873" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600">
    <text x="184" y="190">basin design</text>
    <text x="392" y="156">observation plan</text>
    <text x="600" y="214">model outputs</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M242 268c68-54 132-48 194-8 64 42 128 48 222-16" stroke="url(#teal)" stroke-width="7"/>
    <path d="M328 174c32-6 48-10 72-30M536 144c34 18 53 24 86 42" stroke="#8ac8c0" stroke-width="4"/>
  </g>
  <g fill="#9a7a35">
    <circle cx="242" cy="268" r="10"/>
    <circle cx="436" cy="260" r="10"/>
    <circle cx="658" cy="244" r="10"/>
  </g>
  <g fill="#d7eee9">
    <rect x="184" y="203" width="92" height="8" rx="4"/>
    <rect x="392" y="169" width="104" height="8" rx="4"/>
    <rect x="600" y="227" width="84" height="8" rx="4"/>
  </g>
</svg>
