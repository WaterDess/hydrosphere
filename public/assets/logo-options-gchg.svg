<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">GCHG logo options</title>
  <desc id="desc">Nine character-based GCHG logo concepts with hydrology-inspired negative space.</desc>
  <defs>
    <style>
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:17px;font-weight:760;fill:#8fa6a0}
      .caption{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:13px;font-weight:650;fill:#6f8580}
      .card{fill:#071112;stroke:#213937;stroke-width:1.25}
      .word{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:880;fill:#f5fbf8}
      .mono{font-family:"Arial Narrow","Roboto Condensed","Segoe UI",Arial,sans-serif;font-stretch:condensed;font-weight:860;fill:#f5fbf8}
      .serif{font-family:Georgia,"Times New Roman",serif;font-weight:700;fill:#f5fbf8}
      .cut{fill:none;stroke:#071112;stroke-linecap:round;stroke-linejoin:round}
      .accent{fill:none;stroke:#9fcac4;stroke-linecap:round;stroke-linejoin:round}
      .gold{fill:#b29a5b}
    </style>
    <mask id="m01"><rect width="320" height="190" fill="black"/><text class="word" x="43" y="122" font-size="66" letter-spacing="8" fill="white">GCHG</text></mask>
    <mask id="m02"><rect width="320" height="190" fill="black"/><text class="mono" x="39" y="125" font-size="70" letter-spacing="10" fill="white">GCHG</text></mask>
    <mask id="m03"><rect width="320" height="190" fill="black"/><text class="word" x="50" y="122" font-size="66" letter-spacing="4" fill="white">GCHG</text></mask>
    <mask id="m04"><rect width="320" height="190" fill="black"/><text class="serif" x="46" y="124" font-size="68" letter-spacing="8" fill="white">GCHG</text></mask>
    <mask id="m05"><rect width="320" height="190" fill="black"/><text class="word" x="44" y="122" font-size="66" letter-spacing="7" fill="white">GCHG</text></mask>
    <mask id="m06"><rect width="320" height="190" fill="black"/><text class="mono" x="48" y="126" font-size="74" letter-spacing="5" fill="white">GCHG</text></mask>
    <mask id="m07"><rect width="320" height="190" fill="black"/><text class="word" x="50" y="122" font-size="65" letter-spacing="6" fill="white">GCHG</text></mask>
    <mask id="m08"><rect width="320" height="190" fill="black"/><text class="word" x="42" y="121" font-size="64" letter-spacing="9" fill="white">GCHG</text></mask>
    <mask id="m09"><rect width="320" height="190" fill="black"/><text class="mono" x="40" y="126" font-size="76" letter-spacing="9" fill="white">GCHG</text></mask>
  </defs>
  <rect width="1200" height="900" fill="#f5f9f7"/>
  <text x="72" y="64" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="28" font-weight="820" fill="#233532">GCHG logo directions</text>
  <text x="72" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="620" fill="#667873">Character-driven hydrology marks for review</text>

  <g transform="translate(72 132)">
    <g transform="translate(0 0)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">01 / river cut</text>
      <text class="word" x="43" y="122" font-size="66" letter-spacing="8">GCHG</text>
      <path class="cut" mask="url(#m01)" d="M34 103c52-20 78 11 124-4 44-14 61-44 126-34" stroke-width="12"/>
      <path class="accent" mask="url(#m01)" d="M34 103c52-20 78 11 124-4 44-14 61-44 126-34" stroke-width="2.2"/>
      <text class="caption" x="24" y="162">negative-space channel through letters</text>
    </g>
    <g transform="translate(368 0)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">02 / contour stencil</text>
      <text class="mono" x="39" y="125" font-size="70" letter-spacing="10">GCHG</text>
      <g mask="url(#m02)">
        <path class="cut" d="M34 83c54-12 72-12 126 0s78 12 126 0" stroke-width="9"/>
        <path class="cut" d="M34 104c54-12 72-12 126 0s78 12 126 0" stroke-width="7"/>
        <path class="cut" d="M34 124c54-12 72-12 126 0s78 12 126 0" stroke-width="5"/>
      </g>
      <text class="caption" x="24" y="162">topographic wave cuts</text>
    </g>
    <g transform="translate(736 0)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">03 / basin split</text>
      <text class="word" x="50" y="122" font-size="66" letter-spacing="4">GCHG</text>
      <path class="cut" mask="url(#m03)" d="M61 74c37 32 49 59 47 82M134 62c8 35 35 52 66 63M237 57c-23 37-10 74 31 96" stroke-width="8"/>
      <g class="gold"><circle cx="108" cy="133" r="4"/><circle cx="199" cy="125" r="4"/><circle cx="268" cy="151" r="4"/></g>
      <text class="caption" x="24" y="162">watershed divisions inside the word</text>
    </g>

    <g transform="translate(0 238)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">04 / editorial flow</text>
      <text class="serif" x="46" y="124" font-size="68" letter-spacing="8">GCHG</text>
      <path class="cut" mask="url(#m04)" d="M42 118c43-35 89-34 132-2 35 25 73 21 104-16" stroke-width="10"/>
      <path class="accent" mask="url(#m04)" d="M42 118c43-35 89-34 132-2 35 25 73 21 104-16" stroke-width="2"/>
      <text class="caption" x="24" y="162">serif academic wordmark with flow void</text>
    </g>
    <g transform="translate(368 238)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">05 / glacial notch</text>
      <text class="word" x="44" y="122" font-size="66" letter-spacing="7">GCHG</text>
      <path class="cut" mask="url(#m05)" d="M30 91h42l28 31 35-50 41 63 34-44h74" stroke-width="9"/>
      <path class="accent" mask="url(#m05)" d="M30 91h42l28 31 35-50 41 63 34-44h74" stroke-width="1.9"/>
      <text class="caption" x="24" y="162">mountain-water silhouette in glyphs</text>
    </g>
    <g transform="translate(736 238)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">06 / compact hydro</text>
      <text class="mono" x="48" y="126" font-size="74" letter-spacing="5">GCHG</text>
      <g mask="url(#m06)">
        <path class="cut" d="M48 95c48 0 53-22 96-22s57 44 103 44 35-22 65-22" stroke-width="13"/>
        <path class="accent" d="M48 95c48 0 53-22 96-22s57 44 103 44 35-22 65-22" stroke-width="2.1"/>
      </g>
      <text class="caption" x="24" y="162">condensed mark for masthead use</text>
    </g>

    <g transform="translate(0 476)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">07 / aquifer line</text>
      <text class="word" x="50" y="122" font-size="65" letter-spacing="6">GCHG</text>
      <g mask="url(#m07)">
        <path class="cut" d="M39 93h64c21 0 31 26 56 26h123" stroke-width="10"/>
        <path class="cut" d="M39 119h64c21 0 31-26 56-26h123" stroke-width="7"/>
      </g>
      <text class="caption" x="24" y="162">subsurface flow crossings</text>
    </g>
    <g transform="translate(368 476)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">08 / fractured river</text>
      <text class="word" x="42" y="121" font-size="64" letter-spacing="9">GCHG</text>
      <path class="cut" mask="url(#m08)" d="M35 75c49 22 61 50 117 44 31-3 38-22 65-22 25 0 42 17 70 7" stroke-width="11" stroke-dasharray="46 12 34 10 70"/>
      <path class="accent" mask="url(#m08)" d="M35 75c49 22 61 50 117 44 31-3 38-22 65-22 25 0 42 17 70 7" stroke-width="2" stroke-dasharray="46 12 34 10 70"/>
      <text class="caption" x="24" y="162">broken channel, still character-only</text>
    </g>
    <g transform="translate(736 476)">
      <rect class="card" width="320" height="190" rx="10"/>
      <text class="label" x="24" y="35">09 / delta stencil</text>
      <text class="mono" x="40" y="126" font-size="76" letter-spacing="9">GCHG</text>
      <g mask="url(#m09)">
        <path class="cut" d="M58 82c43 14 66 37 87 71" stroke-width="8"/>
        <path class="cut" d="M152 88c24 18 50 31 95 43" stroke-width="7"/>
        <path class="cut" d="M164 116c35-8 67-27 104-58" stroke-width="6"/>
      </g>
      <text class="caption" x="24" y="162">delta-like branch cuts in the letters</text>
    </g>
  </g>
</svg>
