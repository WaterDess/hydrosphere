<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Code visual</title>
  <desc id="desc">A minimal code editor for hydrological modeling tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#edf6f3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2e6f73" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#dfeae7" stroke-width="1">
    <path d="M88 96h724M88 225h724M88 354h724"/>
    <path d="M184 58v334M360 58v334M536 58v334M712 58v334"/>
  </g>
  <g filter="url(#soft)">
    <rect x="118" y="66" width="664" height="318" rx="12" fill="#ffffff" stroke="#d9e7e3"/>
  </g>
  <g fill="#f0f7f4">
    <rect x="118" y="66" width="664" height="48" rx="12"/>
    <rect x="118" y="100" width="664" height="14"/>
  </g>
  <g fill="#8aa19b">
    <circle cx="154" cy="91" r="5.5"/>
    <circle cx="176" cy="91" r="5.5"/>
    <circle cx="198" cy="91" r="5.5"/>
  </g>
  <path d="M226 114v270" fill="none" stroke="#d9e7e3" stroke-width="2"/>
  <g font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">
    <text x="154" y="154" fill="#9aacaa">01</text>
    <text x="154" y="188" fill="#9aacaa">02</text>
    <text x="154" y="222" fill="#9aacaa">03</text>
    <text x="154" y="256" fill="#9aacaa">04</text>
    <text x="154" y="290" fill="#9aacaa">05</text>
    <text x="154" y="324" fill="#9aacaa">06</text>
    <text x="256" y="154" fill="#7e9690">const</text>
    <text x="316" y="154" fill="#233532">basin</text>
    <text x="374" y="154" fill="#7e9690">= await</text>
    <text x="460" y="154" fill="#2e6f73">loadRaster</text>
    <text x="568" y="154" fill="#667873">("yangtze")</text>
    <text x="256" y="188" fill="#7e9690">const</text>
    <text x="316" y="188" fill="#233532">forcing</text>
    <text x="394" y="188" fill="#7e9690">=</text>
    <text x="420" y="188" fill="#2e6f73">mergeClimate</text>
    <text x="550" y="188" fill="#667873">(era5, cmip)</text>
    <text x="256" y="222" fill="#7e9690">function</text>
    <text x="354" y="222" fill="#2e6f73">forecast</text>
    <text x="448" y="222" fill="#233532">(basin, forcing)</text>
    <text x="612" y="222" fill="#7e9690">{</text>
    <text x="286" y="256" fill="#7e9690">return</text>
    <text x="354" y="256" fill="#2e6f73">model.run</text>
    <text x="452" y="256" fill="#233532">({ basin, forcing })</text>
    <text x="256" y="290" fill="#7e9690">}</text>
    <text x="256" y="324" fill="#9a7a35">forecast</text>
    <text x="344" y="324" fill="#233532">.write("./dist/discharge.zarr")</text>
  </g>
  <g transform="translate(256 344)" font-family="Consolas, Menlo, monospace" font-size="16" font-weight="700">
    <rect x="0" y="0" width="432" height="42" rx="8" fill="#071112"/>
    <text x="20" y="27" fill="#b9c9c5">$ npm run forecast</text>
    <text x="226" y="27" fill="#8ed2c9">ready</text>
    <text x="286" y="27" fill="#c6b06a">3 basins</text>
  </g>
