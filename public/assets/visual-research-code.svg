<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Code visual</title>
  <desc id="desc">A minimal hydrological code workspace with model modules, syntax lines, and a simulated discharge curve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#edf6f3"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#1f7d78"/>
      <stop offset="1" stop-color="#76bcb4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2e6f73" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#dfeae7" stroke-width="1">
    <path d="M80 96h740M80 225h740M80 354h740"/>
    <path d="M180 58v334M350 58v334M520 58v334M690 58v334"/>
  </g>
  <g filter="url(#soft)">
    <rect x="126" y="84" width="648" height="282" rx="12" fill="#ffffff" stroke="#d9e7e3"/>
  </g>
  <g fill="#eff7f4">
    <rect x="126" y="84" width="648" height="48" rx="12"/>
    <rect x="126" y="118" width="648" height="14"/>
  </g>
  <g fill="#8aa19b">
    <circle cx="162" cy="108" r="6"/>
    <circle cx="184" cy="108" r="6"/>
    <circle cx="206" cy="108" r="6"/>
  </g>
  <g fill="none" stroke="#d9e7e3" stroke-width="2">
    <path d="M312 132v234"/>
    <path d="M126 132h648"/>
  </g>
  <g font-family="Consolas, Menlo, monospace" font-size="19" font-weight="700">
    <text x="156" y="172" fill="#7b8f8a">01</text>
    <text x="156" y="214" fill="#7b8f8a">02</text>
    <text x="156" y="256" fill="#7b8f8a">03</text>
    <text x="198" y="172" fill="#233532">model.run</text>
    <text x="198" y="214" fill="#2e6f73">( basin, forcing )</text>
    <text x="198" y="256" fill="#667873">return discharge</text>
  </g>
  <g transform="translate(356 162)">
    <g fill="#ffffff" stroke="#d9e7e3" stroke-width="2">
      <rect x="0" y="0" width="126" height="54" rx="8"/>
      <rect x="178" y="0" width="126" height="54" rx="8"/>
      <rect x="356" y="0" width="126" height="54" rx="8"/>
    </g>
    <g fill="#233532" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700">
      <text x="23" y="34">input</text>
      <text x="204" y="34">model</text>
      <text x="382" y="34">output</text>
    </g>
    <g fill="none" stroke="#8ac8c0" stroke-width="3" stroke-linecap="round">
      <path d="M126 27h52"/>
      <path d="M304 27h52"/>
    </g>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M356 300c54-36 94-29 140-64 46-35 89-35 138-11 42 21 78 19 116-5" stroke="url(#teal)" stroke-width="6"/>
    <path d="M496 236c28 22 44 46 56 76M634 225c24 28 49 45 84 53" stroke="#8ac8c0" stroke-width="3.5"/>
  </g>
  <g fill="#9a7a35">
    <circle cx="496" cy="236" r="8"/>
    <circle cx="634" cy="225" r="8"/>
    <circle cx="552" cy="312" r="7"/>
  </g>
</svg>
